<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[你的名字] 的學習歷程 - 課外活動</title>
    <style>
        /* 延續 index.html 的深色優雅樣式 */
        :root { --bg-main: #0f141c; --bg-card: #18202c; --text-main: #f1f5f9; --text-muted: #94a3b8; --gold: #d4af37; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Georgia", "Noto Sans TC", serif; }
        body { background-color: var(--bg-main); color: var(--text-main); line-height: 1.8; }
        
        nav { background-color: var(--bg-card); padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.2); }
        nav .logo { font-size: 1.3rem; font-weight: bold; color: var(--gold); }
        nav ul { display: flex; list-style: none; gap: 2rem; }
        nav a { text-decoration: none; color: var(--text-muted); transition: 0.3s; }
        nav a:hover, nav a.active { color: var(--gold); }

        main { max-width: 1000px; margin: 4rem auto; padding: 0 2rem; }
        h2 { font-size: 2rem; color: var(--gold); margin-bottom: 2.5rem; text-align: center; letter-spacing: 2px; }

        /* 活動網格卡片 */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 3rem; }
        .card { background-color: var(--bg-card); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card-img { width: 100%; height: 220px; object-fit: cover; opacity: 0.85; transition: 0.3s; }
        .card:hover .card-img { opacity: 1; }
        .card-body { padding: 2rem; }
        .card-tag { color: var(--gold); font-size: 0.8rem; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 0.5rem; display: block; }
        .card-title { font-size: 1.25rem; margin-bottom: 0.75rem; color: var(--text-main); }
        .card-text { color: var(--text-muted); font-size: 0.95rem; }

        footer { text-align: center; padding: 3rem; color: var(--text-muted); font-size: 0.85rem; margin-top: 6rem; }
        @media (max-width: 768px) { nav { flex-direction: column; gap: 1rem; } }
    </style>
</head>
<body>
    <nav>
        <div class="logo">PORTFOLIO</div>
        <ul>
            <li><a href="index.html">自我介紹</a></li>
            <li><a href="activities.html" class="active">課外活動</a></li>
            <li><a href="portfolio.html">作品集</a></li>
        </ul>
    </nav>

    <main>
        <h2>課外活動經歷</h2>
        <div class="grid">
            <div class="card">
                <img src="images/activity1.jpg" alt="活動照片" class="card-img">
                <div class="card-body">
                    <span class="card-tag">// 社團經歷</span>
                    <h3 class="card-title">[社團名稱] - [職位]</h3>
                    <p class="card-text">在這裡寫下你在社團中主導的活動、學到的組織能力，與夥伴們共同達成的成就。</p>
                </div>
            </div>
            <div class="card">
                <img src="images/activity2.jpg" alt="活動照片" class="card-img">
                <div class="card-body">
                    <span class="card-tag">// 社會服務</span>
                    <h3 class="card-title">[志工服務名稱]</h3>
                    <p class="card-text">分享你參與服務的體會，說明你如何運用自身能力回饋社會，並從中獲得的反思。</p>
                </div>
            </div>
        </div>
    </main>

    <footer><p>&copy; 2026 [你的名字]. All rights reserved.</p></footer>
</body>
</html>
